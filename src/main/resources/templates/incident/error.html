<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Sistema de Control de Asistencia</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-calendar-check"></i> Control de Asistencia
            </a>
        </div>
    </nav>

    <!-- Error Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${error != null ? error : 'Error'}">Error</span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger" role="alert">
                            <h5 class="alert-heading">Ha ocurrido un error</h5>
                            <p class="mb-0" th:text="${message != null ? message : 'Se ha producido un error inesperado'}">
                                Mensaje de error
                            </p>
                        </div>

                        <div class="mt-4">
                            <h6 class="text-muted">Detalles del error:</h6>
                            <ul class="list-unstyled">
                                <li>
                                    <strong>Ruta:</strong>
                                    <code th:text="${path != null ? path : 'No disponible'}">path</code>
                                </li>
                                <li>
                                    <strong>Método:</strong>
                                    <span th:text="${method != null ? method : 'No disponible'}">method</span>
                                </li>
                                <li>
                                    <strong>Timestamp:</strong>
                                    <span th:text="${timestamp != null ? #temporals.format(timestamp, 'dd/MM/yyyy HH:mm:ss') : 'No disponible'}">
                                        timestamp
                                    </span>
                                </li>
                            </ul>
                        </div>

                        <hr>

                        <div class="d-flex gap-2">
                            <a href="javascript:history.back()" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                            <a href="/" class="btn btn-primary">
                                <i class="bi bi-house"></i> Ir al Inicio
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
