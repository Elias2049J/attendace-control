<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Actividades')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Actividades</li>
                </ol>
            </nav>
            <div class="row mb-4">
                <div class="col-12 col-md-6">
                    <h2><i class="bi bi-list-task"></i> Actividades</h2>
                </div>
                <div class="col-12 col-md-6 text-md-end mt-2 mt-md-0" sec:authorize="hasAnyRole('ADMIN', 'ORG_OWNER', 'ORG_ADMIN')">
                    <a th:href="@{/activities/new}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Nueva
                    </a>
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row mb-4">
                <div class="col-12">
                    <input type="search"
                           class="form-control form-control-lg"
                           id="searchActivities"
                           placeholder="Buscar actividades..."
                           autocomplete="off">
                </div>
            </div>
            <div id="activitiesList" class="row g-2">
                <div th:each="activity : ${activities}" class="col-12 activity-item"
                     th:data-search="${#strings.toLowerCase(activity.name + ' ' + activity.description + ' ' + (activity.responsible != null ? activity.responsible.name + ' ' + activity.responsible.lastname + ' ' + activity.responsible.email : '') + ' ' + activity.status.displayName)}">
                    <a th:href="@{/activities/{id}(id=${activity.id})}" class="text-decoration-none">
                        <div class="card activity-card shadow-sm">
                            <div class="card-body py-2 px-3">
                                <div class="d-flex align-items-center">
                                    <div class="flex-grow-1">
                                        <h6 class="mb-1 fw-bold" th:text="${activity.name}">Actividad</h6>
                                        <p class="mb-1 text-muted small" th:text="${activity.description}" style="line-height: 1.3;">Descripción</p>

                                        <div class="d-flex flex-wrap gap-3 mt-1">
                                            <small class="text-muted">
                                                <i class="bi bi-circle-fill" style="font-size: 0.4rem;"></i>
                                                <span th:text="${activity.status.displayName}">Estado</span>
                                            </small>
                                            <small class="text-muted" th:if="${activity.responsible != null}">
                                                <i class="bi bi-person"></i>
                                                <span th:text="${activity.responsible.name + ' ' + activity.responsible.lastname}">Responsable</span>
                                            </small>
                                            <small class="text-muted" th:if="${activity.recurrenceRule != null}">
                                                <i class="bi bi-clock"></i>
                                                <span th:text="${#temporals.format(activity.recurrenceRule.startTime, 'hh:mm a')} + ' - ' + ${#temporals.format(activity.recurrenceRule.endTime, 'hh:mm a')}">08:00 AM - 10:00 AM</span>
                                            </small>
                                            <small class="text-muted" th:if="${activity.recurrenceRule != null}">
                                                <i class="bi bi-arrow-repeat"></i>
                                                <span th:text="${activity.recurrenceRule.recurrenceType.displayName}">Semanal</span>
                                            </small>
                                            <small class="text-muted" th:if="${activity.recurrenceRule != null && activity.recurrenceRule.daysOfWeek != null && activity.recurrenceRule.recurrenceType.name() == 'WEEKLY'}">
                                                <i class="bi bi-calendar-week"></i>
                                                <span th:each="day, iterStat : ${#strings.arraySplit(activity.recurrenceRule.daysOfWeek, ',')}">
                                                    <span th:text="${T(com.elias.attendancecontrol.model.entity.DayOfWeek).valueOf(#strings.trim(day)).displayName}">Día</span><span th:if="${!iterStat.last}">, </span>
                                                </span>
                                            </small>
                                        </div>
                                    </div>
                                    <div class="ms-2">
                                        <i class="bi bi-chevron-right text-muted"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
                <div th:if="${#lists.isEmpty(activities)}" class="col-12">
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> No hay actividades disponibles
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{layout :: mobileNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
    <script>
        const searchInput = document.getElementById('searchActivities');
        const activityItems = document.querySelectorAll('.activity-item');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();

            let visibleCount = 0;

            activityItems.forEach(item => {
                const searchText = item.getAttribute('data-search');

                if (query === '' || searchText.includes(query)) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            // Mostrar mensaje si no hay resultados
            const activitiesList = document.getElementById('activitiesList');
            let noResultsMsg = document.getElementById('noResultsMessage');

            if (visibleCount === 0 && query !== '') {
                if (!noResultsMsg) {
                    noResultsMsg = document.createElement('div');
                    noResultsMsg.id = 'noResultsMessage';
                    noResultsMsg.className = 'col-12';
                    noResultsMsg.innerHTML = '<div class="alert alert-info"><i class="bi bi-info-circle"></i> No se encontraron actividades que coincidan con tu búsqueda</div>';
                    activitiesList.appendChild(noResultsMsg);
                }
            } else if (noResultsMsg) {
                noResultsMsg.remove();
            }
        });
    </script>
</body>
</html>
