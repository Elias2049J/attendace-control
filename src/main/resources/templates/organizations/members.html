<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Miembros de Organización')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content">
        <div class="container-fluid py-4">
                    <nav aria-label="breadcrumb" class="d-none d-md-block">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/organizations/{slug}/dashboard(slug=${organization.slug})}" class="text-decoration-none">Mi Organización</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Gestión de Miembros</li>
                        </ol>
                    </nav>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h1 class="h3 mb-1">
                                <i class="bi bi-people"></i>
                                Miembros de <span th:text="${organization.name}">Organización</span>
                            </h1>
                            <p class="text-muted mb-0">
                                <span class="badge bg-primary" th:text="${organization.plan.displayName}">PLAN</span>
                                <span class="ms-2 text-muted small">
                                    <i class="bi bi-person-badge"></i>
                                    <span th:text="${#lists.size(members)} + ' de ' + ${organization.maxUsers} + ' miembros'">0 de 0 miembros</span>
                                </span>
                            </p>
                        </div>
                        <a th:href="@{/organizations/{slug}/dashboard(slug=${organization.slug})}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>Usuario</th>
                                            <th>Nombre Completo</th>
                                            <th>Email</th>
                                            <th>Rol Organización</th>
                                            <th>Estado</th>
                                            <th>Fecha Registro</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="member : ${members}">
                                            <td>
                                                <strong th:text="${member.username}">username</strong>
                                            </td>
                                            <td th:text="${member.name} + ' ' + ${member.lastname}">Nombre Completo</td>
                                            <td>
                                                <a th:href="'mailto:' + ${member.email}" th:text="${member.email}">email@example.com</a>
                                            </td>
                                            <td>
                                                <span th:if="${member.organizationRole}"
                                                      class="badge"
                                                      th:classappend="${member.organizationRole.isOwner() ? 'bg-danger' : (member.organizationRole.isAdmin() ? 'bg-warning': 'bg-primary bg-opacity-0')}"
                                                      th:text="${member.organizationRole.displayName}">
                                                    ORG_ROLE
                                                </span>
                                                <span th:unless="${member.organizationRole}" class="text-muted">-</span>
                                            </td>
                                            <td>
                                                <form th:action="@{'/organizations/' + ${organization.slug} + '/members/' + ${member.id} + '/deactivate'}" method="post" th:id="'deactivateForm-' + ${member.id}">
                                                    <div th:if="${member.active}">
                                                        <div class="dropdown">
                                                            <button class="btn btn-sm btn-outline-success dropdown-toggle" type="button" id="estadoDropdown-[[${member.id}]]" data-bs-toggle="dropdown" aria-expanded="false">
                                                                Activo
                                                            </button>
                                                            <ul class="dropdown-menu" aria-labelledby="estadoDropdown-[[${member.id}]]" style="min-width: 120px;">
                                                                <li>
                                                                    <button class="dropdown-item active" type="button" disabled>Activo</button>
                                                                </li>
                                                                <li>
                                                                    <button class="dropdown-item text-danger" type="button" th:onclick="|confirmAndDeactivate('deactivateForm-' + ${member.id})|">Deshabilitado</button>
                                                                </li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                    <div th:unless="${member.active}">
                                                        <button class="btn btn-sm btn-outline-secondary" type="button" disabled>Deshabilitado</button>
                                                    </div>
                                                </form>
                                            </td>
                                            <td>
                                                <span th:if="${member.createdDate}"
                                                      th:text="${#temporals.format(member.createdDate, 'dd/MM/yyyy')}">
                                                    01/01/2024
                                                </span>
                                                <span th:unless="${member.createdDate}" class="text-muted">-</span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(members)}">
                                            <td colspan="7" class="text-center text-muted py-4">
                                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                No hay miembros en esta organización
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
    <div th:replace="~{layout :: mobileNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
    <script>
function confirmAndDeactivate(formId) {
    if (confirm('Deshabilitar usuario?')) {
        document.getElementById(formId).submit();
    }
}
</script>
</body>
</html>
