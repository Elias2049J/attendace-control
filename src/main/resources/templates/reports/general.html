<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Reporte General')}"></head>
<body>
<div th:replace="~{layout :: sidebar}"></div>
<main class="container py-4">
    <nav aria-label="breadcrumb" class="d-none d-md-block">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
            <li class="breadcrumb-item"><a th:href="@{/reports}" class="text-decoration-none">Reportes</a></li>
            <li class="breadcrumb-item active" aria-current="page">Reporte General</li>
        </ol>
    </nav>
    <h2 class="mb-4"><i class="bi bi-graph-up"></i> Reporte General de Actividades</h2>
    <div th:if="${error}" class="alert alert-danger"> <span th:text="${error}"></span> </div>
    <div th:if="${success}" class="alert alert-success"> <span th:text="${success}"></span> </div>
    <div th:if="${reportData != null}">
        <div class="mb-2">
            <span class="badge bg-secondary me-2">Total actividades: <span th:text="${reportData.rows}"></span></span>
            <span class="badge bg-info text-dark me-2">Generado: <span th:text="${#temporals.format(reportData.timestamp, 'yyyy-MM-dd HH:mm')}"></span></span>
            <span class="badge bg-light text-dark" th:if="${reportData.containsKey('startDate')}">Desde: <span th:text="${reportData.startDate}"></span></span>
            <span class="badge bg-light text-dark" th:if="${reportData.containsKey('endDate')}">Hasta: <span th:text="${reportData.endDate}"></span></span>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-light">
            <tr>
                <th>Actividad</th>
                <th>Total Sesiones</th>
                <th>Presentes</th>
                <th>Faltas</th>
                <th>Tardanzas</th>
                <th>% Asistencia</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(reportData.details)}">
                <td colspan="6" class="text-center text-muted">No hay datos para mostrar en este periodo.</td>
            </tr>
            <tr th:each="row : ${reportData.details}" th:unless="${#lists.isEmpty(reportData.details)}">
                <td th:text="${row.activityName}"></td>
                <td th:text="${row.totalSesiones}"></td>
                <td th:text="${row.totalPresentes}"></td>
                <td th:text="${row.totalFaltas}"></td>
                <td th:text="${row.totalTardanzas}"></td>
                <td th:text="${#numbers.formatDecimal(row.porcentajeAsistencia * 100, 1, 2)} + '%' "></td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/reports}" class="btn btn-secondary mt-3">Volver</a>
</main>
<div th:replace="~{layout :: scripts}"></div>
<div th:replace="~{layout :: mobileNav}"></div>
</body>
</html>
