<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title th:text="${pageTitle != null ? pageTitle + ' - Control de Asistencia' : 'Control de Asistencia'}">Control de Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link th:href="@{/css/theme.css}" rel="stylesheet">
    <link th:href="@{/css/custom-navbar.css}" rel="stylesheet">
</head>
<body>
    <!-- Sidebar para Desktop -->
    <aside th:fragment="sidebar" class="sidebar-navbar bg-primary text-white d-none d-md-flex flex-column">
        <div class="sidebar-header">
            <h5 class="mb-0">
                <i class="bi bi-calendar-check"></i>
                <span class="ms-2">MIRAE</span>
            </h5>
        </div>
        <nav class="flex-grow-1 py-3">
            <a th:href="@{/}" th:class="'sidebar-link' + ${activeMenu == 'home' ? ' active' : ''}">
                <i class="bi bi-house-door"></i>
                <span class="ms-2">Inicio</span>
            </a>
            <a th:href="@{/activities}" th:class="'sidebar-link' + ${activeMenu == 'activities' ? ' active' : ''}"
                th:if="${isOrgOwnerOrAdmin == true or isOrgMember == true}">
                <i class="bi bi-list-task"></i>
                <span class="ms-2">Actividades</span>
            </a>
            <a th:href="@{/calendar}" th:class="'sidebar-link' + ${activeMenu == 'calendar' ? ' active' : ''}"
                th:if="${isOrgOwnerOrAdmin == true or isOrgMember == true}">
                <i class="bi bi-calendar3"></i>
                <span class="ms-2">Calendario</span>
            </a>
<!--            <a th:href="@{/incidents}" th:class="'sidebar-link' + ${activeMenu == 'incidents' ? ' active' : ''}"-->
<!--               th:if="${isOrgOwnerOrAdmin == true}">-->
<!--                <i class="bi bi-exclamation-triangle"></i>-->
<!--                <span class="ms-2">Incidencias</span>-->
<!--            </a>-->
            <a th:href="@{/organizations/{slug}/dashboard(slug=${currentUser?.organization?.slug})}"
               th:class="'sidebar-link' + ${activeMenu == 'organizations' ? ' active' : ''}"
               th:if="${(isOrgOwner == true or isOrgAdmin == true) and isSysAdmin != true and currentOrganizationId != null}">
                <i class="bi bi-building"></i>
                <span class="ms-2">Mi Organización</span>
            </a>
            <a th:href="@{/users}"
               th:class="'sidebar-link' + ${activeMenu == 'organizations' ? ' active' : ''}"
               th:if="${isSysAdmin}">
                <i class="bi bi-people"></i>
                <span class="ms-2">Usuarios</span>
            </a>
            <a th:href="@{/organizations/{slug}/members(slug=${currentUser?.organization?.slug})}"
               th:class="'sidebar-link' + ${activeMenu == 'organizations' ? ' active' : ''}"
               th:if="${(isOrgOwner == true or isOrgAdmin == true) and isSysAdmin != true and currentOrganizationId != null}">
                <i class="bi bi-people"></i>
                <span class="ms-2">Miembros</span>
            </a>
            <a th:href="@{/organizations/all}" th:class="'sidebar-link' + ${activeMenu == 'organizations-list' ? ' active' : ''}"
               th:if="${isSysAdmin == true}">
                <i class="bi bi-buildings"></i>
                <span class="ms-2">Organizaciones</span>
            </a>
            <a th:href="@{/reports}" th:class="'sidebar-link' + ${activeMenu == 'reports' ? ' active' : ''}"
               th:if="${isOrgOwnerOrAdmin == true}">
                <i class="bi bi-graph-up"></i>
                <span class="ms-2">Reportes</span>
            </a>
            <a th:href="@{/audit}" th:class="'sidebar-link' + ${activeMenu == 'audit' ? ' active' : ''}"
               th:if="${isSysAdmin == true}">
                <i class="bi bi-shield-check"></i>
                <span class="ms-2">Auditoría</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/profile}" th:class="'sidebar-link' + ${activeMenu == 'profile' ? ' active' : ''}">
                <i class="bi bi-person-circle"></i>
                <span class="ms-2">Mi Perfil</span>
            </a>
        </div>
    </aside>

    <!-- Mobile Bottom Navbar -->
    <nav th:fragment="mobileNav" class="mobile-bottom-navbar fixed-bottom bg-white border-top d-md-none">
        <div class="mobile-nav-scroll">
            <div class="mobile-nav-items">
                <a th:href="@{/}" th:class="'mobile-nav-item' + ${activeMenu == 'home' ? ' active' : ''}">
                    <i class="bi bi-house-door"></i>
                    <small>Inicio</small>
                </a>
                <a th:href="@{/activities}" th:class="'mobile-nav-item' + ${activeMenu == 'activities' ? ' active' : ''}"
                   th:if="${isOrgOwnerOrAdmin == true or isOrgMember == true}">
                    <i class="bi bi-list-task"></i>
                    <small>Actividades</small>
                </a>
                <a th:href="@{/calendar}" th:class="'mobile-nav-item' + ${activeMenu == 'calendar' ? ' active' : ''}"
                   th:if="${isOrgOwnerOrAdmin == true or isOrgMember == true}">
                    <i class="bi bi-calendar3"></i>
                    <small>Calendario</small>
                </a>
<!--                <a th:href="@{/incidents}" th:class="'mobile-nav-item' + ${activeMenu == 'incidents' ? ' active' : ''}"-->
<!--                   th:if="${isOrgOwnerOrAdmin == true}">-->
<!--                    <i class="bi bi-exclamation-triangle"></i>-->
<!--                    <small>Incidencias</small>-->
<!--                </a>-->
                <a th:href="@{/organizations/{slug}/dashboard(slug=${currentUser?.organization?.slug})}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations' ? ' active' : ''}"
                   th:if="${isOrgOwnerOrAdmin == true and currentOrganizationId != null}">
                    <i class="bi bi-building"></i>
                    <small>Mi Org</small>
                </a>
                <a th:href="@{/users}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations' ? ' active' : ''}"
                   th:if="${isSysAdmin}">
                    <i class="bi bi-people"></i>
                    <small>Usuarios</small>
                </a>
                <a th:href="@{/organizations/{slug}/members(slug=${currentUser?.organization?.slug})}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations' ? ' active' : ''}"
                   th:if="${isOrgOwnerOrAdmin == true and currentOrganizationId != null}">
                    <i class="bi bi-people"></i>
                    <small>Miembros</small>
                </a>
                <a th:href="@{/organizations/all}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'organizations-list' ? ' active' : ''}"
                   th:if="${isSysAdmin == true}">
                    <i class="bi bi-buildings"></i>
                    <small>Organizaciones</small>
                </a>
                <a th:href="@{/reports}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'reports' ? ' active' : ''}"
                   th:if="${isOrgOwnerOrAdmin == true}">
                    <i class="bi bi-graph-up"></i>
                    <small>Reportes</small>
                </a>
                <a th:href="@{/audit}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'audit' ? ' active' : ''}"
                   th:if="${isSysAdmin == true}">
                    <i class="bi bi-shield-check"></i>
                    <small>Auditoría</small>
                </a>
                <a th:href="@{/profile}"
                   th:class="'mobile-nav-item' + ${activeMenu == 'profile' ? ' active' : ''}">
                    <i class="bi bi-person-circle"></i>
                    <small>Mi Perfil</small>
                </a>
            </div>
        </div>
    </nav>

    <footer class="bg-dark text-center py-3 mt-4" th:fragment="footer">
        <div class="container">
            <p class="mb-0 text-success">
                <i class="bi bi-c-circle"></i>
                <span th:text="${#dates.year(#dates.createNow())}">2026</span>
                MIRAE - Sistema de Control de Asistencia
            </p>
        </div>
    </footer>
    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </th:block>
</body>
</html>
