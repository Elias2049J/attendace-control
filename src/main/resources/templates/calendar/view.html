<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Calendario')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="flex-grow-1" id="main-content"><div class="container-fluid py-4">
        <nav aria-label="breadcrumb" class="d-none d-md-block">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item active" aria-current="page">Calendario</li>
            </ol>
        </nav>
        <div class="row">
            <div class="col-12">
                <div class="d-flex align-items-center mb-3">
                    <div>
                        <h2 class="mb-1"><i class="bi bi-calendar3"></i> Calendario de Sesiones</h2>
                        <p class="text-muted mb-0">Visualiza y gestiona todas las sesiones programadas</p>
                    </div>
                </div>
                <hr class="mb-4">
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form method="get" th:action="@{/calendar}" class="row g-3 align-items-end">
                            <div class="col-md-5">
                                <label for="startDate" class="form-label fw-semibold">
                                    <i class="bi bi-calendar-event"></i> Fecha Inicio
                                </label>
                                <input type="date" class="form-control form-control-lg" id="startDate" name="startDate"
                                       th:value="${startDate}">
                            </div>
                            <div class="col-md-5">
                                <label for="endDate" class="form-label fw-semibold">
                                    <i class="bi bi-calendar-event"></i> Fecha Fin
                                </label>
                                <input type="date" class="form-control form-control-lg" id="endDate" name="endDate"
                                       th:value="${endDate}">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary btn-lg w-100">
                                    <i class="bi bi-search"></i> Filtrar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-bottom">
                        <h5 class="mb-0 fw-bold text-primary">
                            <i class="bi bi-calendar-week"></i> Sesiones del Período
                        </h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}">Operación exitosa</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}">Error</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div th:if="${#lists.isEmpty(sessions)}" class="text-center text-muted py-5">
                            <i class="bi bi-calendar-x" style="font-size: 4rem; opacity: 0.3;"></i>
                            <p class="mt-3 fs-5">No hay sesiones en este rango de fechas</p>
                        </div>

                        <div th:unless="${#lists.isEmpty(sessions)}" class="calendar-sessions">
                            <div th:each="sessionEntity : ${sessions}" class="session-card-wrapper mb-3">
                                <div class="card border session-card shadow-sm">
                                    <div class="card-body p-0">
                                        <div class="row g-0">
                                            <div class="col-auto d-flex flex-column align-items-center justify-content-center border-end px-3 py-3" style="min-width: 90px;">
                                                <span class="text-uppercase fw-bold text-primary" style="font-size: 0.875rem; letter-spacing: 0.5px;"
                                                      th:text="${#temporals.format(sessionEntity.sessionDate, 'EEE', #locale).toUpperCase()}">LUN</span>
                                                <span class="fw-bold" style="font-size: 2.5rem; line-height: 1;"
                                                      th:text="${#temporals.format(sessionEntity.sessionDate, 'd')}">8</span>
                                                <span class="text-muted small"
                                                      th:text="${#temporals.format(sessionEntity.sessionDate, 'MMM', #locale)}">Ene</span>
                                            </div>

                                            <div class="col">
                                                <div class="p-3">
                                                    <div class="d-flex flex-column gap-2">
                                                        <div>
                                                            <span class="d-inline-flex align-items-center px-2 py-1 rounded text-uppercase small fw-semibold"
                                                                  th:classappend="${sessionEntity.status.isPlanned()} ? 'text-primary' : (${sessionEntity.status.isActive()} ? 'text-success' : (${sessionEntity.status.isClosed()} ? 'text-secondary' : 'text-danger'))"
                                                                  style="font-size: 0.7rem; letter-spacing: 0.5px; background-color: rgba(var(--bs-primary-rgb), 0.1);"
                                                                  th:style="${sessionEntity.status.isPlanned()} ? 'background-color: rgba(13, 110, 253, 0.1);' : (${sessionEntity.status.isActive()} ? 'background-color: rgba(25, 135, 84, 0.1);' : (${sessionEntity.status.isClosed()} ? 'background-color: rgba(108, 117, 125, 0.1);' : 'background-color: rgba(220, 53, 69, 0.1);'))">
                                                                <span th:text="${sessionEntity.status.displayName}">Programada</span>
                                                            </span>
                                                        </div>

                                                        <div>
                                                            <h6 class="mb-1 fw-bold d-flex align-items-start">
                                                                <span class="d-inline-block rounded-circle me-2 flex-shrink-0"
                                                                      style="width: 8px; height: 8px; margin-top: 6px; background-color: var(--bs-primary);"></span>
                                                                <span th:text="${sessionEntity.activity.name}">Nombre Actividad</span>
                                                            </h6>
                                                            <p class="mb-2 text-muted small ps-4" th:text="${sessionEntity.activity.description}">Descripción</p>
                                                        </div>

                                                        <div class="d-flex flex-wrap gap-3 ps-4 small">
                                                            <span class="text-muted d-flex align-items-center">
                                                                <i class="bi bi-clock me-1"></i>
                                                                <span th:text="${#temporals.format(sessionEntity.startTime, 'hh:mm a')} + ' - ' + ${#temporals.format(sessionEntity.endTime, 'hh:mm a')}">08:00 AM - 10:00 AM</span>
                                                            </span>
                                                            <span class="text-muted d-flex align-items-center">
                                                                <i class="bi bi-hourglass-split me-1"></i>
                                                                <span>Tolerancia: <span th:text="${sessionEntity.toleranceMinutes}">15</span> min</span>
                                                            </span>
                                                            <span class="text-muted d-flex align-items-center"
                                                                  th:if="${sessionEntity.activity != null and sessionEntity.activity.responsible != null}">
                                                                <i class="bi bi-person-circle me-1"></i>
                                                                <span th:text="${sessionEntity.activity.responsible.name + ' ' + sessionEntity.activity.responsible.lastname}">Responsable</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div></main><div th:replace="~{layout :: mobileNav}"></div>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
